name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (for example 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-26
    env:
      APP_NAME: Apple Container Desktop
      SCHEME: apple.containers.gui
      PROJECT: apple.containers.gui.xcodeproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_26.5.app/Contents/Developer"

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT" -scheme "$SCHEME"

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -only-testing:apple.containers.guiTests \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM=""

      - name: Import signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build Release app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          BUILD_DIR="$RUNNER_TEMP/DerivedData"
          ARCHIVE_PATH="$RUNNER_TEMP/$SCHEME.xcarchive"
          EXPORT_DIR="$RUNNER_TEMP/export"

          SIGN_ARGS=(
            CODE_SIGNING_ALLOWED=YES
            DEVELOPMENT_TEAM=""
            CODE_SIGN_IDENTITY="-"
          )

          if [[ -n "${APPLE_TEAM_ID:-}" && -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ]]; then
            SIGN_ARGS=(
              CODE_SIGNING_ALLOWED=YES
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
              CODE_SIGN_IDENTITY="Developer ID Application"
            )
          fi

          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$BUILD_DIR" \
            "${SIGN_ARGS[@]}"

          mkdir -p "$EXPORT_DIR"

          if [[ -n "${APPLE_TEAM_ID:-}" && -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" ]]; then
            /usr/libexec/PlistBuddy -c "Set :teamID $APPLE_TEAM_ID" .github/macos-export-options.plist
            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportPath "$EXPORT_DIR" \
              -exportOptionsPlist .github/macos-export-options.plist
            APP_PATH="$EXPORT_DIR/apple.containers.gui.app"
          else
            APP_PATH="$ARCHIVE_PATH/Products/Applications/apple.containers.gui.app"
          fi

          DIST_DIR="$RUNNER_TEMP/dist"
          mkdir -p "$DIST_DIR"
          cp -R "$APP_PATH" "$DIST_DIR/$APP_NAME.app"

          ZIP_NAME="Apple-Container-Desktop-${{ steps.version.outputs.version }}-macos-arm64.zip"
          ditto -c -k --keepParent "$DIST_DIR/$APP_NAME.app" "$RUNNER_TEMP/$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          echo "APP_PATH=$DIST_DIR/$APP_NAME.app" >> "$GITHUB_ENV"

      - name: Notarize app
        if: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          ZIP_PATH="$RUNNER_TEMP/$ZIP_NAME"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Apple-Container-Desktop-${{ steps.version.outputs.version }}-macos-arm64
          path: ${{ runner.temp }}/${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: Apple Container Desktop ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ runner.temp }}/${{ env.ZIP_NAME }}
          body: |
            ## Install

            1. Download `Apple-Container-Desktop-${{ steps.version.outputs.version }}-macos-arm64.zip`.
            2. Unzip and move `Apple Container Desktop.app` to `/Applications`.
            3. Requires macOS 26.4 or later and Apple's [container CLI](https://github.com/apple/container).

            ## Gatekeeper

            - If the app is **notarized** (Developer ID secrets configured in the repository), it should open normally after download.
            - If the build is **ad-hoc signed** (default without signing secrets), macOS may block the first launch. Open it once with **Control-click → Open**, or run:

            ```bash
            xattr -cr "/Applications/Apple Container Desktop.app"
            ```

            ## Build info

            - Platform: macOS arm64
            - Built with Xcode 26.5 on GitHub Actions (`macos-26`)
