name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_26.5.app/Contents/Developer"

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project apple.containers.gui.xcodeproj -scheme apple.containers.gui

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project apple.containers.gui.xcodeproj \
            -scheme apple.containers.gui \
            -destination 'platform=macOS' \
            -parallel-testing-enabled NO \
            -only-testing:apple.containers.guiTests \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM=""

      - name: Build Release app
        run: |
          xcodebuild build \
            -project apple.containers.gui.xcodeproj \
            -scheme apple.containers.gui \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM=""
